captive_portal:

# ─── Ultrasonic sensor — reports raw distance to Home Assistant ────────────
# All derived values (fill %, volume, fill rate, alerts) are computed
# in HA by the Water Tank Monitor integration.
#
# Adjust min_value / max_value to your tank's physical measurements:
#   min_value = distance from sensor to water surface when FULL
#   max_value = distance from sensor to water surface when EMPTY
# ──────────────────────────────────────────────────────────────────────────
sensor:
  - platform: ultrasonic
    trigger_pin: D7
    echo_pin: D6
    name: "Water Distance"
    id: tank_distance
    update_interval: 10s
    unit_of_measurement: "m"
    accuracy_decimals: 3
    filters:
      # Clamp to physical limits of the tank (full → empty)
      - clamp:
          min_value: 0.10   # meters when full  — adjust to your tank
          max_value: 1.20   # meters when empty — adjust to your tank
      # Smooth out noisy readings with a sliding window median
      - median:
          window_size: 5
          send_every: 1
