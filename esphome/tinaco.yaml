captive_portal:

# ─── Ultrasonic sensor — reports raw distance to Home Assistant ────────────
# All derived values (fill %, volume, fill rate, alerts) are computed
# in HA by the Tinaco Monitor integration.
# ──────────────────────────────────────────────────────────────────────────
sensor:
  - platform: ultrasonic
    trigger_pin: D7
    echo_pin: D6
    name: "Distancia al Agua"
    id: tank_distance
    update_interval: 10s
    unit_of_measurement: "m"
    accuracy_decimals: 3
    filters:
      # Clamp to physical limits of the tank (full → empty)
      - clamp:
          min_value: 0.10
          max_value: 1.20
      # Smooth out noisy readings with a sliding window median
      - median:
          window_size: 5
          send_every: 1
