blueprint:
  name: "Water Tank Monitor — Level Alerts"
  description: >
    Sends push notifications (Home Assistant companion app) and persistent
    sidebar notifications when the water tank level drops below configured
    thresholds, or when it becomes full.
  domain: automation
  source_url: https://github.com/royeiror/tinaco-monitor/blob/main/blueprints/automation/tinaco_monitor/tank_alerts.yaml

  input:
    notify_device:
      name: Mobile Device
      description: >
        Device with the Home Assistant app installed.
        This device will receive push notifications.
      selector:
        device:
          integration: mobile_app

    sensor_low_level:
      name: Sensor — Low Level
      description: "Select binary_sensor.water_tank_monitor_low_level"
      selector:
        entity:
          domain: binary_sensor

    sensor_critical_level:
      name: Sensor — Critical Level
      description: "Select binary_sensor.water_tank_monitor_critical_level"
      selector:
        entity:
          domain: binary_sensor

    sensor_tank_full:
      name: Sensor — Tank Full
      description: "Select binary_sensor.water_tank_monitor_tank_full"
      selector:
        entity:
          domain: binary_sensor

    sensor_volume:
      name: Sensor — Water Volume
      description: "Select sensor.water_tank_monitor_water_volume"
      selector:
        entity:
          domain: sensor

    sensor_percentage:
      name: Sensor — Fill Percentage
      description: "Select sensor.water_tank_monitor_fill_percentage"
      selector:
        entity:
          domain: sensor

    delay_minutes:
      name: Alert delay (minutes)
      description: >
        Wait this long before firing an alert to ignore transient sensor
        readings. Recommended: 2 minutes.
      default: 2
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: min
          mode: slider

# ── Variables ──────────────────────────────────────────────────────────────
variables:
  notify_device: !input notify_device
  sensor_volume: !input sensor_volume
  sensor_percentage: !input sensor_percentage
  notify_service: >-
    {{ 'notify.mobile_app_' ~ (
         device_attr(notify_device, 'name')
         | lower
         | regex_replace('[^a-z0-9]+', '_')
         | regex_replace('^_+|_+$', '')
       ) }}

# ── Triggers ───────────────────────────────────────────────────────────────
trigger:
  - platform: state
    entity_id: !input sensor_critical_level
    to: "on"
    for:
      minutes: !input delay_minutes
    id: critical

  - platform: state
    entity_id: !input sensor_low_level
    to: "on"
    for:
      minutes: !input delay_minutes
    id: low

  - platform: state
    entity_id: !input sensor_tank_full
    to: "on"
    for:
      minutes: !input delay_minutes
    id: full

# ── Actions ────────────────────────────────────────────────────────────────
action:
  - variables:
      volume: "{{ states(sensor_volume) | float(0) | round(0) | int }}"
      pct: "{{ states(sensor_percentage) | float(0) | round(0) | int }}"

  - choose:

      # ── Critical Level ───────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: critical
        sequence:
          - action: "{{ notify_service }}"
            data:
              title: "🔴 Water Tank Almost Empty!"
              message: >-
                The water tank is almost empty! Only {{ volume }} L remaining ({{ pct }}%).
                Please refill as soon as possible.
              data:
                push:
                  sound: default
          - action: persistent_notification.create
            data:
              title: "🔴 Water Tank — Critical Level"
              message: >-
                The water tank is almost empty! Only {{ volume }} L remaining ({{ pct }}%).
              notification_id: water_tank_critical
          - action: persistent_notification.dismiss
            data:
              notification_id: water_tank_low

      # ── Low Level ────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: low
          - condition: state
            entity_id: !input sensor_critical_level
            state: "off"
        sequence:
          - action: "{{ notify_service }}"
            data:
              title: "🟡 Water Tank — Low Level"
              message: >-
                The water tank is at {{ pct }}%. Only {{ volume }} L remaining.
                Consider refilling soon.
          - action: persistent_notification.create
            data:
              title: "🟡 Water Tank — Low Level"
              message: >-
                The water tank is at {{ pct }}%. Only {{ volume }} L remaining.
              notification_id: water_tank_low

      # ── Tank Full ────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: full
        sequence:
          - action: "{{ notify_service }}"
            data:
              title: "🟢 Water Tank Full!"
              message: >-
                The water tank is full — {{ volume }} L ({{ pct }}%).
                Don't forget to close the valve!
          - action: persistent_notification.dismiss
            data:
              notification_id: water_tank_low
          - action: persistent_notification.dismiss
            data:
              notification_id: water_tank_critical
          - action: persistent_notification.create
            data:
              title: "🟢 Water Tank Full"
              message: "The water tank is full — {{ volume }} L."
              notification_id: water_tank_full

mode: single
