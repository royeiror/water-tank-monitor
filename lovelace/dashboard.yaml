title: Water Tank
views:
  - title: Water Tank Monitor
    path: water-tank
    icon: mdi:water-pump
    badges: []
    cards:

      # ── Row 1: Gauge + current readings ──────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.water_tank_monitor_fill_percentage
            name: Tank Level
            unit: "%"
            min: 0
            max: 100
            needle: true
            severity:
              green: 30
              yellow: 20
              red: 0

          - type: entities
            title: Current Status
            show_header_toggle: false
            entities:
              - entity: sensor.water_tank_monitor_water_volume
                name: Volume
                icon: mdi:water
              - entity: sensor.water_tank_monitor_fill_percentage
                name: Fill Level
                icon: mdi:water-percent
              - entity: sensor.water_tank_monitor_fill_rate
                name: Fill Rate
                icon: mdi:waves-arrow-up
              - type: divider
              - entity: binary_sensor.water_tank_monitor_low_level
                name: Low Level
                icon: mdi:water-alert
              - entity: binary_sensor.water_tank_monitor_critical_level
                name: Critical Level
                icon: mdi:water-off
              - entity: binary_sensor.water_tank_monitor_tank_full
                name: Tank Full
                icon: mdi:water-check

      # ── Row 2: 24h history ───────────────────────────────────────────────
      - type: history-graph
        title: Last 24 Hours
        hours_to_show: 24
        logarithmic_scale: false
        entities:
          - entity: sensor.water_tank_monitor_fill_percentage
            name: Fill Level (%)
          - entity: sensor.water_tank_monitor_water_volume
            name: Volume (L)

      # ── Row 3: 7-day history ─────────────────────────────────────────────
      - type: history-graph
        title: Last 7 Days
        hours_to_show: 168
        logarithmic_scale: false
        entities:
          - entity: sensor.water_tank_monitor_fill_percentage
            name: Fill Level (%)
          - entity: sensor.water_tank_monitor_water_volume
            name: Volume (L)

      # ── Row 4: Daily statistics ──────────────────────────────────────────
      - type: statistics-graph
        title: Today's Statistics
        entities:
          - entity: sensor.water_tank_monitor_fill_percentage
            name: Fill Level
          - entity: sensor.water_tank_monitor_water_volume
            name: Volume
        stat_types:
          - min
          - max
          - mean
        period:
          calendar:
            period: day
